mainSections   = ["posts"]
rssFullContent = true

[footer]
    since = 2026

[dateFormat]
    published   = "2006-01-02"
    lastUpdated = "2006-01-02"

[sidebar]
    compact = false
    emoji   = "💻"
    subtitle = "技术笔记 & 分享"
    avatar   = "img/avatar.png"

[article]
    headingAnchor = true
    math          = false
    toc           = true
    readingTime   = true

    [article.license]
        enabled = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page     = [{ type = "toc" }]

[comments]
    enabled  = false

# GDPR Cookie Consent
[cookies]
    enabled = false

[colorScheme]
    toggle  = true
    default = "auto"

[opengraph.twitter]
    site = ""
    card = "summary_large_image"
